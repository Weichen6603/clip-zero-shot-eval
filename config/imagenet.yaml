# ImageNet Configuration for CLIP Zero-Shot Evaluation
# Using official Hugging Face imagenet-1k dataset

# CLIP model configuration
clip_model: "ViT-B/32"  # Options: RN50, RN101, RN50x4, RN50x16, ViT-B/32, ViT-B/16, ViT-L/14
device: "cuda"  # cuda or cpu
use_ensemble: true  # Whether to use multiple templates for text encoding

# Evaluation settings
batch_size: 32  # Smaller batch size for ImageNet due to larger images
num_workers: 8
save_predictions: false  # Save individual predictions (large files)

# Output settings
output_dir: "./results/imagenet_1k_evaluation"
save_results: true

# Dataset configurations
datasets:
  # ImageNet dataset from Hugging Face (official imagenet-1k)
  - name: "ImageNet-1K"
    type: "imagenet"
    streaming: true  # Set to true to enable HuggingFace streaming mode
    root_path: "./data/imagenet"  # Cache directory on Windows D: drive via WSL mount
    split: "validation"  # Use validation split (50K images)
