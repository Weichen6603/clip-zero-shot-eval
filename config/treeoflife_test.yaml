# TreeOfLife Configuration - Quick Test Version
# Uses train split with sample and shard limits for rapid testing

# CLIP model configuration
clip_model: "ViT-B/32"
device: "cuda"
use_ensemble: true

# Evaluation settings
batch_size: 16  # Smaller batch for large images
num_workers: 4  # Reduced workers to avoid memory issues
save_predictions: false

# Output settings
output_dir: "./results/treeoflife_quick_test"
save_results: true

# Dataset configurations
datasets:
  # TreeOfLife-10M Quick Test
  - name: "TreeOfLife-10M-QuickTest"
    type: "treeoflife"
    root_path: "./data/treeoflife"  # Use relative path
    split: "train"  # Use train split
    
    # Quick test configuration
    max_samples: 100       # Just 100 samples for testing
    max_shards: 1          # Only process first shard
    taxonomic_level: "species"
    use_common_names: true
    exclude_partial_labels: false
    min_images_per_class: 1
    min_images_per_class: 1
    use_precomputed_embeddings: true
    
