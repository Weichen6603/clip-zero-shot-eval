# CLIP model configuration
clip_model: "ViT-B/32"  # Options: RN50, RN101, RN50x4, RN50x16, ViT-B/32, ViT-B/16, ViT-L/14
device: "cuda"  # cuda or cpu
use_ensemble: true  # Whether to use multiple templates for text encoding

# Evaluation settings
batch_size: 32
num_workers: 4
save_predictions: false  # Save individual predictions (large files)

# General output settings
output_dir: "./results/cifar100_evaluation"
save_results: false

# Dataset configurations
datasets:
  # CIFAR-100 dataset with fine labels (100 classes)
  - name: "CIFAR100_Fine"
    type: "cifar100"
    root_path: "/mnt/d/data/cifar100"
    output_dir: "./results/cifar100_fine_eval"
    split: "test"  # train or test
    use_coarse_labels: false  # Use 100 fine-grained classes

  # CIFAR-100 dataset with coarse labels (20 superclasses)
  - name: "CIFAR100_Coarse"
    type: "cifar100"
    root_path: "/mnt/d/data/cifar100"
    output_dir: "./results/cifar100_coarse_eval"
    split: "test"  # train or test
    use_coarse_labels: true  # Use 20 coarse-grained classes
