# imagenet_test.yaml - Quick test configuration
clip_model: "ViT-B/32"
device: "cuda"
use_ensemble: false  # Faster without ensemble

batch_size: 128  # Larger batch for testing
num_workers: 4
save_predictions: false

output_dir: "./results/imagenet_test"
save_results: true

datasets:
  - name: "ImageNet-1K-Test"
    type: "imagenet"
    root_path: "/mnt/d/data/imagenet"
    split: "validation"
    use_cache: true
    max_samples: 1000  # Only test on 1000 samples