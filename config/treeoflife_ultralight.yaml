# TreeOfLife-10M Ultra-Lightweight Configuration  
# 🚀 Goal: Download only 3 shards (~300MB) instead of 73 shards (~3TB)
# ⚡ Perfect for: Quick testing, algorithm development, CI/CD

# CLIP model configuration
clip_model: "ViT-B/32"  # Fastest CLIP model for testing
device: "cuda"  # Change to "cpu" if no GPU available
use_ensemble: true  # Use ensemble for better accuracy

# Evaluation settings - optimized for speed
batch_size: 32  # Small batch for quick processing
num_workers: 8  # Minimal workers for lightweight testing
save_predictions: false  # Don't save predictions for quick tests

# Output settings
output_dir: "./results/treeoflife_ultralight"
save_results: true

# Dataset configurations
datasets:
  # Ultra-lightweight TreeOfLife-10M configuration
  - name: "TreeOfLife-Ultra-Light"
    type: "treeoflife"
    root_path: "/mnt/d/data/treeoflife"  # HuggingFace cache directory
    split: "train"            # TreeOfLife-10M only has 'train' split
    
    # 🔥 ULTRA-LIGHTWEIGHT SETTINGS 🔥
    max_shards: 3             # Download only first 3 shards (~300MB vs ~3TB)
    max_samples: 20           # Use only 20 images for super quick testing
    
    # Taxonomic configuration
    taxonomic_level: "family" # Broader classification (fewer classes, easier)
    use_common_names: true    # Include vernacular names
    exclude_partial_labels: false # Keep all available data
    min_images_per_class: 2   # Lower threshold for more classes
    
    # Optimization
    use_precomputed_embeddings: true  # Use BioCLIP embeddings if available
    
    # Expected results with these settings:
    # - Download: ~300MB (3 shards × ~100MB each) vs 3TB full dataset  
    # - Images: ~300 samples vs 1M+ full dataset
    # - Classes: ~50-100 families vs 454K+ species
    # - Time: 5-10 minutes total (download + evaluation)
    # - Perfect for: Development, debugging, quick tests
