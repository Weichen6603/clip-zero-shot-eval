# TreeOfLife-10M Configuration - Using Official train_small Split


# train_small advantages:
# - Official curated subset (953K images vs 9.5M in full train)
# - Balanced taxonomic distribution

# CLIP model configuration
clip_model: "ViT-B/32"  # Options: RN50, RN101, RN50x4, RN50x16, ViT-B/32, ViT-B/16, ViT-L/14
device: "cuda"  # cuda or cpu
use_ensemble: true  # Whether to use multiple templates for text encoding

# Evaluation settings
batch_size: 32  # Optimized batch size for memory efficiency
num_workers: 8  # Number of data loading workers
save_predictions: false  # Save individual predictions (large files for this dataset)

# Output settings
output_dir: "./results/treeoflife_lightweight"
save_results: true

# Dataset configurations
datasets:
  # TreeOfLife-10M using official train_small split (953K images)
  - name: "TreeOfLife-10M-TrainSmall"
    type: "treeoflife"
    streaming: true
    root_path: "/mnt/d/data/treeoflife"  # Cache directory for HuggingFace datasets
    split: "train_small"      # Use official lightweight split
    
    # Taxonomic configuration
    taxonomic_level: "species"        # Classification level: species, genus, family, order, class, phylum, kingdom
    exclude_partial_labels: false    # Whether to exclude samples without full taxonomic hierarchy
    
    # train_small is already a curated lightweight subset
    max_samples: null                 # Use all train_small samples (~953K images)
    min_images_per_class: 1           # Minimum images per taxonomic class to include
    use_precomputed_embeddings: true  # Use BioCLIP text embeddings when available
    
    # Alternative testing configurations:
    
    # 🧪 Ultra-light testing (for development/debugging):
    # max_samples: 100
    # min_images_per_class: 1
    # taxonomic_level: "family"
    
    # 🔬 Small-scale evaluation (balanced testing):
    # max_samples: 5000
    # min_images_per_class: 3
    # taxonomic_level: "genus"
    
    # 📊 Medium-scale evaluation (research quality):
    # max_samples: 20000
    # min_images_per_class: 5
    # taxonomic_level: "species"
    
    # 🚀 Large-scale evaluation (within lightweight constraints):
    # max_samples: null  # Use all samples
    # min_images_per_class: 10
    # taxonomic_level: "species"
    
    # 💡 Performance optimization tips:
    # - Start with taxonomic_level: "family" for faster testing
    # - Increase to "genus" or "species" for finer-grained classification
    # - Adjust min_images_per_class based on desired class balance
    # - Enable use_precomputed_embeddings for BioCLIP text features
    # - Monitor GPU memory with batch_size adjustments
