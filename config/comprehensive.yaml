# Comprehensive CLIP Zero-Shot Evaluation Configuration
# Tests all available datasets except TreeOfLife-Full (for complete benchmark)

# CLIP model configuration
clip_model: "ViT-B/32"  # Options: RN50, RN101, RN50x4, RN50x16, ViT-B/32, ViT-B/16, ViT-L/14
device: "cuda"  # cuda or cpu
use_ensemble: true  # Whether to use multiple templates for text encoding

# Evaluation settings
batch_size: 32  # Optimized batch size for memory efficiency
num_workers: 8  # Number of data loading workers
save_predictions: false  # Save individual predictions (large files)

# Output settings
save_results: false

# Dataset configurations
datasets:
  # CIFAR-10 dataset (10 classes, quick benchmark)
  - name: "CIFAR10"
    type: "cifar10"
    root_path: "./data/cifar10"
    split: "test"

  # CIFAR-100 dataset with fine labels (100 classes)
  - name: "CIFAR100_Fine"
    type: "cifar100"
    root_path: "./data/cifar100"
    split: "test"
    use_coarse_labels: false

  # CIFAR-100 dataset with coarse labels (20 superclasses)
  - name: "CIFAR100_Coarse"
    type: "cifar100"
    root_path: "./data/cifar100"
    split: "test"
    use_coarse_labels: true

  # SUN397 scene recognition dataset
  - name: "SUN397"
    type: "sun397"
    streaming: true
    root_path: "./data/sun397"
    split: "train"

  # ImageNet-1K validation set
  - name: "ImageNet-1K"
    type: "imagenet"
    streaming: true
    root_path: "./data/imagenet"
    split: "validation"

  # Visual Genome with WordNet synsets (recommended)
  - name: "VisualGenome-Objects-Synsets"
    type: "visual_genome"
    streaming: true
    root_path: "./data/visual_genome"
    split: "train"
    config_name: "objects_v1.2.0"
    max_samples: null      
    min_objects: 1
    use_synsets: true        # Use WordNet synsets for better semantic quality

  # TreeOfLife-10M Lightweight (biological dataset)
  - name: "TreeOfLife-10M-Lightweight"
    type: "treeoflife"
    streaming: true
    root_path: "./data/treeoflife"
    split: "train"
    config_name: "train_small"
    taxonomic_level: "species"
    strict_label_filtering: false    # Whether to apply strict filtering of uncertain/confusing labels (default: false)
