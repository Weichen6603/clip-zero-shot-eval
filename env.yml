name: clip
channels:
  - defaults
  - conda-forge
dependencies:
  - python=3.10.18  # Python version
  - pip
  - pip:
      - --extra-index-url https://download.pytorch.org/whl/cu128  # PyTorch CUDA 12.8 wheels
      - torch==2.7.1+cu128            # PyTorch (CUDA 12.8)
      - torchvision==0.22.1+cu128     # TorchVision (CUDA 12.8)
      - torchaudio==2.7.1+cu128       # TorchAudio (CUDA 12.8)
      - clip @ git+https://github.com/openai/CLIP.git  # OpenAI CLIP model
      - numpy>=2.0.0,<3.0.0           # NumPy 2.x (scientific computing)
      - scipy>=1.11.0                 # Scientific computing
      - scikit-learn>=1.3.0           # Machine learning utilities
      - pandas>=2.0.0                 # Data analysis
      - Pillow>=10.0.0                # Image processing
      - datasets>=2.0.0               # Hugging Face Datasets
      - tqdm>=4.65.0                  # Progress bars
      - pyyaml>=6.0                   # YAML config parsing
      - matplotlib>=3.7.0             # Plotting (optional, recommended)
