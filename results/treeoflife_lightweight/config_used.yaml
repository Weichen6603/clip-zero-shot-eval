clip_model: ViT-B/32
device: cuda
use_ensemble: true
batch_size: 32
num_workers: 8
save_predictions: false
output_dir: ./results/treeoflife_lightweight
save_results: true
datasets:
- name: TreeOfLife-10M-TrainSmall
  type: treeoflife
  root_path: /mnt/d/data/treeoflife
  split: train_small
  streaming: true
  taxonomic_level: species
  exclude_partial_labels: false
  max_samples: null
  min_images_per_class: 1
  use_precomputed_embeddings: true
