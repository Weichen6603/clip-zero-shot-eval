clip_model: ViT-B/32
device: cuda
use_ensemble: true
batch_size: 32
num_workers: 8
save_predictions: false
output_dir: ./results/comprehensive_evaluation
save_results: true
datasets:
- name: CIFAR10
  type: cifar10
  root_path: /mnt/d/data/cifar10
  split: test
- name: CIFAR100_Fine
  type: cifar100
  root_path: /mnt/d/data/cifar100
  split: test
  use_coarse_labels: false
- name: CIFAR100_Coarse
  type: cifar100
  root_path: /mnt/d/data/cifar100
  split: test
  use_coarse_labels: true
- name: SUN397
  type: sun397
  root_path: /mnt/d/data/sun397
  split: train
- name: ImageNet-1K
  type: imagenet
  root_path: /mnt/d/data/imagenet
  split: validation
- name: VisualGenome-Objects-Synsets
  type: visual_genome
  root_path: /mnt/d/data/visual_genome
  split: train
  config_name: objects_v1.2.0
  min_objects: 1
  use_synsets: true
- name: TreeOfLife-10M-Lightweight
  type: treeoflife
  root_path: /mnt/d/data/treeoflife
  split: train
  max_shard_count: 3
  taxonomic_level: species
